name: pure_md
description: "一款 Modern & Minimalist 的移动端 Markdown 阅读器"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_markdown: ^0.7.7
  file_picker: ^9.2.1
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.3
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  dynamic_color: ^1.7.0
  home_widget: ^0.7.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  uuid: ^4.5.1
  intl: ^0.20.2
  screenshot: ^3.0.0
  pdf: ^3.11.3
  markdown: ^7.3.0
  archive: ^4.0.0
  gal: ^2.3.2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/documents/
